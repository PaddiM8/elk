name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '*/packages.lock.json'
      - run: |
          dotnet restore --force-evaluate
          dotnet build
          dotnet test
